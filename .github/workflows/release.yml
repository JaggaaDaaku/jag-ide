name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: release-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build Backend (Release)
        run: cargo build -p jag-server --release

      - name: Bundle Sidecar
        run: |
          New-Item -ItemType Directory -Path frontend/bin -Force
          Copy-Item target/release/jag-server.exe frontend/bin/jag-server.exe

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Frontend Deps
        run: cd frontend && npm ci

      - name: Build & Package Installer
        run: cd frontend && npm run dist

      - name: Generate Checksums
        run: |
          $exe = Get-ChildItem frontend/release/*.exe | Select-Object -First 1
          if ($exe) {
            $hash = Get-FileHash $exe.FullName -Algorithm SHA256
            "$($hash.Algorithm): $($hash.Hash)  $($exe.Name)" | Out-File frontend/release/SHA256SUMS.txt
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            frontend/release/*.exe
            frontend/release/SHA256SUMS.txt
          body_path: CHANGELOG.md
          draft: false
          prerelease: false
