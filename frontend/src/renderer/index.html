<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Required CSP for Electron — no remote scripts allowed -->
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Google Fonts: Inter (UI) + JetBrains Mono (code) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <title>Jag IDE</title>
  <style>
    /* Prevent any flash of white before React mounts */
    html, body, #root {
      margin: 0; padding: 0;
      width: 100vw; height: 100vh;
      background: #1e1e2e;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <!-- Renderer bundle injected by webpack -->
  <script src="../dist/renderer.js"></script>
</body>
</html>
